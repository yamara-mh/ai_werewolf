<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI人狼 – ゲーム</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="game-layout">

    <!-- ゲーム情報バー -->
    <div class="game-header">
      <span id="phase-label" class="game-header__phase">準備中…</span>
      <span id="day-label" class="game-header__day"></span>
    </div>

    <!-- BBS エリア -->
    <div class="bbs-area">
      <div class="bbs-scroll-day-controls">
        <button type="button" id="bbs-day-scroll-up-btn" class="btn btn--secondary btn--sm" aria-label="1日前へ">▲</button>
        <button type="button" id="bbs-day-scroll-down-btn" class="btn btn--secondary btn--sm" aria-label="1日後へ">▼</button>
      </div>
      <div id="bbs-container"></div>
      <button type="button" id="bbs-scroll-bottom-btn" class="btn btn--secondary bbs-scroll-bottom-btn hidden" aria-label="最新投稿へ">⬇️</button>
    </div>

    <!-- 常時表示チャット入力エリア -->
    <div class="chat-bar">
      <form id="chat-form" class="chat-form">
        <div class="chat-form__top">
          <span id="role-label" class="chat-role-label"></span>
          <select id="co-role-select" class="form-control co-role-select">
            <option value="">CO</option>
            <option value="villager">👤 村人</option>
            <option value="seer">🔮 占い師</option>
            <option value="medium">🪬 霊媒師</option>
            <option value="hunter">🛡️ 騎士</option>
            <option value="madman">🤪 狂人</option>
            <option value="werewolf">🐺 人狼</option>
            <option value="shared">🤝 共有者</option>
            <option value="cat">🐈 猫又</option>
            <option value="fox">🦊 妖狐</option>
            <option value="white_wolf">🐺 大狼</option>
          </select>
          <button type="button" id="logic-ai-btn" class="btn btn--secondary btn--sm">🤖 AI</button>
          <button type="button" id="bookmark-filter-btn" class="btn btn--secondary btn--sm">🔖</button>
          <span id="chat-top-actions"></span>
        </div>
        <div class="chat-form__bottom">
          <button type="button" id="whisper-mode-btn" class="btn btn--primary" style="display:none;">🤫</button>
          <textarea id="chat-input" class="chat-input" placeholder="発言を入力（Ctrl + Enterで投稿）" rows="2" maxlength="300"></textarea>
          <button type="submit" id="chat-submit" class="btn btn--primary">🗣️</button>
        </div>
      </form>
    </div>

    <!-- サイドバー：プレイヤー一覧 -->
    <aside class="sidebar">
      <div class="sidebar__title">👥 プレイヤー</div>
      <div id="player-list"></div>
    </aside>

  </div>

  <!-- 投票モーダル -->
  <div id="vote-modal" class="modal-overlay hidden">
    <div class="modal modal--action">
      <h2 class="modal__title">🗳️ 投票先を選ぶ</h2>
      <div id="vote-modal-player-list" class="modal-player-list"></div>
      <button id="vote-modal-back-btn" class="btn btn--secondary mt-2">戻る</button>
    </div>
  </div>

  <!-- 夜アクションモーダル -->
  <div id="night-modal" class="modal-overlay hidden">
    <div class="modal modal--action">
      <h2 class="modal__title" id="night-modal-title">🌙 対象を選ぶ</h2>
      <div id="night-modal-player-list" class="modal-player-list"></div>
      <button id="night-modal-back-btn" class="btn btn--secondary mt-2">戻る</button>
    </div>
  </div>

  <!-- ゲーム終了モーダル -->
  <div id="end-modal" class="modal-overlay hidden">
    <div class="modal">
      <h2 class="modal__title">ゲーム終了</h2>
      <div id="end-message"></div>
      <button id="restart-btn" class="btn btn--primary mt-2">もう一度遊ぶ</button>
    </div>
  </div>

  <!-- ロジックAI モーダル -->
  <div id="logic-ai-modal" class="modal-overlay hidden">
    <div class="modal modal--logic-ai">
      <h2 class="modal__title">🤖 ロジックAI 分析</h2>
      <div id="logic-ai-content" class="logic-ai-content">（まだ分析が実行されていません）</div>
      <button id="logic-ai-close" class="btn btn--secondary mt-2">閉じる</button>
    </div>
  </div>

  <!-- ローディングオーバーレイ -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="loading-overlay__content">
      <div class="loading-spinner"></div>
      <p class="loading-overlay__text">AIが応答を生成中…</p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/game.js"></script>
  <script src="js/bbs.js"></script>
  <script src="js/api.js"></script>
  <script src="js/prompts.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/controller.js"></script>
</body>
</html>
